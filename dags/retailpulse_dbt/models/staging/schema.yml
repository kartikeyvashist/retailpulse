version: 2

sources:
  - name: retailpulse
    database: retailpulse
    schema: public
    tables:
      - name: customers
        columns:
          - name: customer_id
            tests:
              - unique
              - not_null
      - name: products
        columns:
          - name: product_id
            tests: 
            - unique
            - not_null
      - name: orders
        columns:
          - name: order_id
            tests:
            - unique
            - not_null