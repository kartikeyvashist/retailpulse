name: dbt tests

on:
  push:
    branches:
      - main

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: retailpulse
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dbt
        run: pip install dbt-core dbt-postgres
      - name: install Python dependencies
        run: pip install psycopg2-binary pandas sqlalchemy faker
      - name: Create tables
        run: python db.py
        env: 
          DB_HOST: localhost
      - name: Generate data
        run: python generate_data.py
      - name: Ingest data
        run: python ingestion.py
        env:
          DB_HOST: localhost
      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          retailpulse_dbt:
            outputs:
              dev:
                type: postgres
                host: localhost
                user: admin
                password: admin123
                port: 5432
                dbname: retailpulse
                schema: public
                threads: 1
            target: dev
          EOF

      - name: Run dbt tests
        run: |
          cd retailpulse_dbt
          dbt run
          dbt test